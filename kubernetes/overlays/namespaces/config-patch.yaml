apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluxcd-policyctl
  namespace: flux-system
spec:
  template:
    spec:
      containers:
        - name: fluxcd-policyctl
          env:
            - name: POLICYCTL_ACCESS_MODE
              value: "namespaces"
            - name: POLICYCTL_NAMESPACES
              value: "dev-01,stage-01"
